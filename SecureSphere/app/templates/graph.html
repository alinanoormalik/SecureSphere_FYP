<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background-color: #0A0A0A; margin: 0; overflow: hidden; }
        line { stroke: #444; stroke-width: 2; }
        circle { fill: #00E5FF; stroke: #fff; stroke-width: 1.5; }
        text { fill: white; font-family: sans-serif; font-size: 12px; }
    </style>
</head>
<body>
    <svg id="viz"></svg>
    <script>
        // This data will be injected by your Python backend
        const data = {
            nodes: [{id: "User"}, {id: "Instagram"}, {id: "TikTok"}, {id: "GitHub"}],
            links: [{source: "User", target: "Instagram"}, {source: "User", target: "TikTok"}, {source: "User", target: "GitHub"}]
        };

        const width = window.innerWidth, height = window.innerHeight;
        const svg = d3.select("#viz").attr("width", width).attr("height", height);

        const simulation = d3.forceSimulation(data.nodes)
            .force("link", d3.forceLink(data.links).id(d => d.id).distance(100))
            .force("charge", d3.forceManyBody().strength(-200))
            .force("center", d3.forceCenter(width / 2, height / 2));

        const link = svg.append("g").selectAll("line").data(data.links).enter().append("line");
        const node = svg.append("g").selectAll("circle").data(data.nodes).enter().append("circle").attr("r", 12);
        const text = svg.append("g").selectAll("text").data(data.nodes).enter().append("text").text(d => d.id).attr("dx", 15).attr("dy", 5);

        simulation.on("tick", () => {
            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            node.attr("cx", d => d.x).attr("cy", d => d.y);
            text.attr("x", d => d.x).attr("y", d => d.y);
        });
    </script>
</body>
</html>
